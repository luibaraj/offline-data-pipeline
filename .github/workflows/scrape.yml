name: Scrape LinkedIn Jobs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Purge jobs older than 24 hours
        run: sqlite3 jobs.db "DELETE FROM jobs WHERE scraped_at < datetime('now', '-1 day');" || true

      - name: Random startup delay (0–20 min)
        run: sleep $((RANDOM % 1200))

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache HuggingFace tokenizer
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-tokenizer-voyage-3.5-lite

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          WEBSHARE_PROXY_URL: ${{ secrets.WEBSHARE_PROXY_URL }}
        run: python main.py scrape

      - name: Preprocess job descriptions
        run: python main.py preprocess

      - name: Extract qualifications and responsibilities
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python main.py extract

      - name: Extract qualification metadata
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python main.py extract-meta

      - name: Embed job descriptions
        env:
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: python main.py embed

      - name: Build ChromaDB vector index
        run: python main.py index

      - name: Commit updated jobs.db and chroma_index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.db chroma_index/
          git diff --cached --quiet || git commit -m "chore: update jobs.db [skip ci]"
          git push
