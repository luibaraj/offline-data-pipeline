name: Scrape LinkedIn Jobs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Random startup delay (0–20 min)
        run: sleep $((RANDOM % 1200))

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          WEBSHARE_PROXY_URL: ${{ secrets.WEBSHARE_PROXY_URL }}
        run: python main.py scrape

      - name: Commit updated jobs.db
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.db
          git diff --cached --quiet || git commit -m "chore: update jobs.db [skip ci]"
          git push
